<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>Trade</title>
  <?!= include('Style'); ?>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <button class="icon-button is-hidden" id="backButton" type="button" aria-label="戻る">
        <span aria-hidden="true">‹</span>
      </button>
      <div>
        <p class="app-kicker" id="viewLabel">今日の記録</p>
        <h1>Trade</h1>
      </div>
      <button class="icon-button" id="refreshButton" type="button" aria-label="再読み込み">
        <span aria-hidden="true">↻</span>
      </button>
    </header>

    <main>
      <section class="view is-active" id="homeView" aria-labelledby="homeTitle">
        <div class="section-heading">
          <h2 id="homeTitle">今日の記録</h2>
          <button class="text-button" id="historyButton" type="button">履歴を見る</button>
        </div>

        <section class="upload-panel" aria-label="新規エントリー">
          <div>
            <p class="panel-label">新しく記録する</p>
            <p class="panel-copy">エントリー時のチャート画像を保存</p>
          </div>
          <button class="primary-button" id="entryUploadButton" type="button">エントリー画像を保存</button>
          <input class="file-input" id="entryFileInput" type="file" accept="image/jpeg,image/png,image/webp">
        </section>

        <section aria-labelledby="waitingTitle">
          <div class="section-heading compact">
            <h2 id="waitingTitle">結果待ち</h2>
            <span class="count-pill" id="waitingCount">0件</span>
          </div>
          <div class="empty-state" id="waitingEmpty">
            <p>結果待ちの記録はありません。</p>
          </div>
          <div class="card-stack" id="waitingList"></div>
        </section>
      </section>

      <section class="view" id="historyView" aria-labelledby="historyTitle">
        <div class="section-heading">
          <h2 id="historyTitle">履歴</h2>
          <button class="text-button" id="homeFromHistoryButton" type="button">ホームへ</button>
        </div>
        <div class="empty-state" id="historyEmpty">
          <p>まだ記録がありません。</p>
        </div>
        <div class="history-list" id="historyList"></div>
      </section>

      <section class="view" id="detailView" aria-labelledby="detailTitle">
        <div class="section-heading">
          <h2 id="detailTitle">詳細</h2>
          <span class="status-pill" id="detailStatus">-</span>
        </div>
        <div id="detailContent"></div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="loading-cover" id="loadingCover" aria-live="polite">
    <div class="loading-box">読み込み中...</div>
  </div>

  <?!= include('Script'); ?>
</body>
</html>
